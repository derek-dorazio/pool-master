# Development docker-compose — local databases and services
# Usage: docker compose -f infrastructure/docker/docker-compose.dev.yml up

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: poolmaster
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
