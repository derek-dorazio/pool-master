<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PoolMaster — Playbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --panel-2: #151515;
    --line: #222222;
    --line-2: #2e2e2e;
    --text: #f5f5f5;
    --muted: #8c8c8c;
    --lime: #c8ff3d;
    --lime-deep: #a8e023;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 1180px; margin: 0 auto; padding: 32px 24px 80px; }
  .top { display: flex; align-items: center; justify-content: space-between; padding-bottom: 40px; }
  .wordmark { display: flex; align-items: center; gap: 12px; }
  .wordmark .name { font-weight: 800; font-size: 17px; letter-spacing: -0.01em; }
  .status { font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .status .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--lime); box-shadow: 0 0 8px var(--lime); }

  .shell {
    display: grid;
    grid-template-columns: 1.15fr 0.85fr;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--panel);
    overflow: hidden;
  }
  @media (max-width: 960px) { .shell { grid-template-columns: 1fr; } }

  .hero {
    position: relative;
    min-height: 560px;
    padding: 44px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border-right: 1px solid var(--line);
    background-color: #0c0c0c;
    background-image: url('hero.jpg');
    background-size: cover;
    background-position: center;
    overflow: hidden;
  }
  .hero-fallback { position: absolute; inset: 0; z-index: 0;
    background:
      linear-gradient(135deg, transparent 35%, rgba(200, 255, 61, 0.85) 35%, rgba(200, 255, 61, 0.85) 36.2%, transparent 36.2%) center/100% 100%,
      linear-gradient(135deg, transparent 48%, rgba(200, 255, 61, 0.28) 48%, rgba(200, 255, 61, 0.28) 48.6%, transparent 48.6%) center/100% 100%,
      linear-gradient(135deg, transparent 60%, rgba(200, 255, 61, 0.12) 60%, rgba(200, 255, 61, 0.12) 60.4%, transparent 60.4%) center/100% 100%,
      radial-gradient(ellipse at 20% 80%, #1a1a1a 0%, #0a0a0a 70%); }
  .hero-fallback::after {
    content: ""; position: absolute; inset: 0;
    background:
      linear-gradient(90deg, rgba(10,10,10,0.4) 0%, transparent 40%),
      linear-gradient(0deg, rgba(10,10,10,0.6) 0%, transparent 50%);
  }
  .hero > * { position: relative; z-index: 1; }

  .eyebrow {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--lime);
    padding: 5px 10px;
    border: 1px solid rgba(200, 255, 61, 0.4);
    border-radius: 4px;
  }
  .headline {
    font-size: 60px;
    font-weight: 800;
    line-height: 0.98;
    letter-spacing: -0.035em;
    margin: 22px 0 16px;
    max-width: 520px;
  }
  .headline .accent { color: var(--lime); }
  .subhead {
    font-size: 16px;
    line-height: 1.55;
    max-width: 440px;
    color: #bcbcbc;
  }
  .stats { display: flex; gap: 28px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .stats strong { display: block; color: var(--text); font-size: 20px;
    font-family: 'Inter', sans-serif; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 2px; }

  .form-pane { padding: 48px 40px; background: var(--panel-2); }
  .tabs { display: flex; background: #1c1c1c; border: 1px solid var(--line); border-radius: 10px; padding: 3px; gap: 2px; }
  .tab { flex: 1; padding: 10px 12px; border-radius: 7px; border: 0; background: transparent;
    font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; font-family: inherit; }
  .tab.active { background: #000; color: var(--text); box-shadow: inset 0 0 0 1px var(--line-2); }
  form { margin-top: 28px; display: flex; flex-direction: column; gap: 16px; }
  label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  input { width: 100%; margin-top: 8px; padding: 13px 14px; border-radius: 10px;
    border: 1px solid var(--line-2); background: #0a0a0a; color: var(--text);
    font-size: 14px; font-family: inherit; }
  input:focus { outline: none; border-color: var(--lime); box-shadow: 0 0 0 3px rgba(200, 255, 61, 0.15); }
  .submit { padding: 14px; border-radius: 10px; border: 0;
    background: var(--lime); color: #0a0a0a;
    font-weight: 700; font-size: 14px; cursor: pointer; letter-spacing: -0.01em; font-family: inherit; }
  .submit:hover { background: var(--lime-deep); }
  .meta { margin-top: 22px; font-size: 13px; color: var(--muted); }
  .meta a { color: var(--lime); font-weight: 600; text-decoration: none; }
  .meta a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="page">
  <header class="top">
    <div class="wordmark">
      <svg width="28" height="28" viewBox="0 0 32 32" aria-label="PoolMaster">
        <rect x="2" y="2" width="28" height="28" rx="6" fill="#c8ff3d"/>
        <path d="M9 22 L14 9 L18 9 L23 22" stroke="#0a0a0a" stroke-width="2.5" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
        <line x1="11.5" y1="17" x2="20.5" y2="17" stroke="#0a0a0a" stroke-width="2.5"/>
      </svg>
      <span class="name">PoolMaster<span style="color: var(--lime);">/</span></span>
    </div>
    <div class="status"><span class="dot"></span>operational · v2026.04</div>
  </header>

  <section class="shell">
    <div class="hero">
      <div class="hero-fallback"></div>
      <div>
        <span class="eyebrow">// commissioners only</span>
        <h1 class="headline">Run the league.<br><span class="accent">Skip</span> the spreadsheet.</h1>
        <p class="subhead">Leagues, drafts, standings, and scoring — in one place, without the group-chat chaos.</p>
      </div>
      <div class="stats">
        <div><strong>1 min</strong>time to spin up</div>
        <div><strong>0</strong>spreadsheets</div>
        <div><strong>∞</strong>seasons</div>
      </div>
    </div>

    <div class="form-pane">
      <div class="tabs">
        <button class="tab active" type="button">Sign in</button>
        <button class="tab" type="button">Create account</button>
      </div>
      <form onsubmit="event.preventDefault()">
        <label>Username or email
          <input type="text" autocomplete="username" />
        </label>
        <label>Password
          <input type="password" autocomplete="current-password" />
        </label>
        <button class="submit" type="submit">Sign in →</button>
      </form>
      <p class="meta">First time here? <a href="#">Create an account</a></p>
    </div>
  </section>
</div>
</body>
</html>
