<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PoolMaster — Season Ticket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #0e2a3b;
    --forest-deep: #071822;
    --cream: #f3ecdc;
    --cream-soft: #faf5e8;
    --gold: #cfa456;
    --burgundy: #7a2230;
    --ink: #1c1a18;
    --muted: rgba(28, 26, 24, 0.6);
    --border: rgba(28, 26, 24, 0.14);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--cream-soft);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 10%, rgba(207, 164, 86, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(14, 42, 59, 0.06) 0%, transparent 45%);
  }
  .page { max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; }
  .top { display: flex; align-items: center; justify-content: space-between; padding-bottom: 40px; }
  .wordmark { display: flex; align-items: center; gap: 14px; }
  .wordmark .name { font-family: 'Fraunces', Georgia, serif; font-weight: 700; font-size: 20px; letter-spacing: 0.01em; }
  .wordmark .since { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
  .nav { font-size: 13px; color: var(--muted); letter-spacing: 0.05em; }

  .shell {
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 28px;
    background: #fff;
    overflow: hidden;
    box-shadow: 0 30px 60px -30px rgba(14, 42, 59, 0.25);
  }
  @media (max-width: 960px) { .shell { grid-template-columns: 1fr; } }

  .hero {
    position: relative;
    min-height: 560px;
    padding: 40px;
    color: var(--cream);
    background-color: var(--forest);
    background-image:
      linear-gradient(180deg, rgba(7, 24, 34, 0.55) 0%, rgba(14, 42, 59, 0.75) 100%),
      url('hero.jpg');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .hero::before {
    content: "";
    position: absolute;
    inset: 20px;
    border: 1px solid rgba(207, 164, 86, 0.35);
    border-radius: 18px;
    pointer-events: none;
  }
  .hero-fallback {
    position: absolute; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse at 30% 25%, #1a5a43 0%, #0e2a3b 55%, #071822 100%);
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 0.26em; text-transform: uppercase; color: var(--gold);
  }
  .eyebrow::before { content: ""; width: 28px; height: 1px; background: var(--gold); display: inline-block; }
  .headline {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 700;
    font-size: 56px;
    line-height: 1.02;
    letter-spacing: -0.015em;
    margin: 20px 0 14px;
    max-width: 500px;
  }
  .subhead {
    font-size: 16px;
    line-height: 1.6;
    max-width: 420px;
    color: rgba(243, 236, 220, 0.82);
  }
  .stamp {
    display: flex; align-items: center; gap: 12px;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(207, 164, 86, 0.85);
  }
  .stamp .line { height: 1px; width: 40px; background: rgba(207, 164, 86, 0.5); }

  .form-pane { padding: 48px 44px; background: var(--cream-soft); }
  .tabs { display: flex; background: rgba(14, 42, 59, 0.06); border-radius: 999px; padding: 4px; gap: 4px; }
  .tab { flex: 1; padding: 10px 16px; border-radius: 999px; border: 0; background: transparent;
    font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer;
    font-family: 'Inter', sans-serif; }
  .tab.active { background: #fff; color: var(--ink); box-shadow: 0 1px 3px rgba(14, 42, 59, 0.12); }
  form { margin-top: 28px; display: flex; flex-direction: column; gap: 18px; }
  label { display: block; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; }
  input { width: 100%; margin-top: 8px; padding: 13px 16px; border-radius: 14px;
    border: 1px solid var(--border); font-size: 14px; background: #fff;
    font-family: inherit; color: var(--ink); }
  input:focus { outline: none; border-color: var(--forest); box-shadow: 0 0 0 3px rgba(14, 42, 59, 0.12); }
  .submit { padding: 14px; border-radius: 14px; border: 0;
    background: var(--forest); color: var(--cream);
    font-weight: 600; font-size: 14px; cursor: pointer;
    letter-spacing: 0.02em; font-family: inherit;
    transition: background 150ms ease; }
  .submit:hover { background: #092131; }
  .meta { margin-top: 24px; font-size: 13px; color: var(--muted); }
  .meta a { color: var(--burgundy); font-weight: 600; text-decoration: none; }
  .meta a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="page">
  <header class="top">
    <div class="wordmark">
      <svg width="44" height="44" viewBox="0 0 64 64" aria-label="PoolMaster crest">
        <circle cx="32" cy="32" r="30" fill="#0e2a3b" />
        <circle cx="32" cy="32" r="27" fill="none" stroke="#cfa456" stroke-width="1" />
        <text x="32" y="32" text-anchor="middle" dominant-baseline="central"
              fill="#f3ecdc" font-family="Fraunces, Georgia, serif"
              font-weight="900" font-size="22" letter-spacing="-1">PM</text>
        <path d="M14 47 Q 32 56 50 47" fill="none" stroke="#cfa456" stroke-width="0.9" />
        <text x="32" y="54" text-anchor="middle" fill="#cfa456"
              font-family="Inter, sans-serif" font-size="5.5" letter-spacing="2.5">EST · 2026</text>
      </svg>
      <div>
        <div class="name">PoolMaster</div>
        <div class="since">The Season Ticket</div>
      </div>
    </div>
    <nav class="nav">An almanac for every pool.</nav>
  </header>

  <section class="shell">
    <div class="hero">
      <div class="hero-fallback"></div>
      <div>
        <span class="eyebrow">Welcome back, Commissioner</span>
        <h1 class="headline">Where your league lives.</h1>
        <p class="subhead">One home for every pick, every pool, every season — kept like a record you'll want to hand down.</p>
      </div>
      <div class="stamp">
        <span class="line"></span>
        <span>Vol. I · No. 01</span>
        <span class="line"></span>
      </div>
    </div>

    <div class="form-pane">
      <div class="tabs">
        <button class="tab active" type="button">Sign in</button>
        <button class="tab" type="button">Create account</button>
      </div>
      <form onsubmit="event.preventDefault()">
        <label>Username or email
          <input type="text" autocomplete="username" />
        </label>
        <label>Password
          <input type="password" autocomplete="current-password" />
        </label>
        <button class="submit" type="submit">Sign in</button>
      </form>
      <p class="meta">New to PoolMaster? <a href="#">Create an account</a></p>
    </div>
  </section>
</div>
</body>
</html>
