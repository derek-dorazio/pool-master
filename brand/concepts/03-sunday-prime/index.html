<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ultimate Pool Manager — Sunday Prime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,600;0,700;0,900;1,800;1,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0b1e3f;
    --navy-deep: #05122a;
    --navy-light: #16325e;
    --gold: #f5b800;
    --gold-bright: #ffc82e;
    --red: #a8202d;
    --paper: #f5f5f2;
    --ink: #0b0b0b;
    --muted: rgba(255,255,255,0.66);
    --border: rgba(255,255,255,0.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--navy-deep);
    color: #fff;
    min-height: 100vh;
  }
  .page { max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; }
  .top { display: flex; align-items: center; justify-content: space-between; padding-bottom: 36px; }
  .wordmark { display: flex; align-items: center; gap: 12px; }
  .wordmark .name { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 20px;
    letter-spacing: -0.02em; font-style: italic; text-transform: uppercase; }
  .live-tag { display: flex; align-items: center; gap: 8px; font-family: 'Archivo', sans-serif;
    font-weight: 700; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }
  .live-tag::before { content: ""; width: 8px; height: 8px; border-radius: 999px; background: var(--red);
    box-shadow: 0 0 0 3px rgba(168, 32, 45, 0.3); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  .shell {
    display: grid;
    grid-template-columns: 0.8fr 1.2fr;
    border-radius: 24px;
    background: var(--navy);
    overflow: hidden;
    box-shadow: 0 40px 80px -30px rgba(0,0,0,0.7);
  }
  @media (max-width: 960px) { .shell { grid-template-columns: 1fr; } }

  .hero {
    position: relative;
    min-height: 580px;
    padding: 44px 28px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background-color: var(--navy);
    background-image:
      linear-gradient(180deg, rgba(11, 30, 63, 0.55) 0%, rgba(5, 18, 42, 0.82) 100%),
      url('hero.jpg');
    background-size: cover;
    background-position: center;
    overflow: hidden;
  }
  .hero-fallback { position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 50% 90%, rgba(245, 184, 0, 0.4) 0%, transparent 55%),
      radial-gradient(ellipse at 20% 30%, rgba(22, 50, 94, 0.8) 0%, transparent 60%),
      linear-gradient(180deg, var(--navy-light) 0%, var(--navy-deep) 100%);
  }
  .hero-fallback::after {
    content: "";
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(transparent 0 79px, rgba(255,255,255,0.05) 79px 80px);
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0.05));
  }
  .hero > * { position: relative; z-index: 1; }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'Archivo', sans-serif; font-weight: 700;
    font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--gold);
    padding: 6px 12px;
    background: rgba(245, 184, 0, 0.12);
    border: 1px solid rgba(245, 184, 0, 0.35);
    border-radius: 4px;
  }
  .headline {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-style: italic;
    font-size: 44px;
    line-height: 0.92;
    letter-spacing: -0.035em;
    text-transform: uppercase;
    margin: 24px 0 20px;
    max-width: 520px;
    text-shadow: 0 2px 24px rgba(0,0,0,0.3);
  }
  .headline .line { display: block; margin-bottom: 16px; }
  .headline .line:last-child { margin-bottom: 0; }
  .headline .gold { color: var(--gold); }
  .subhead {
    font-size: 16px;
    line-height: 1.55;
    max-width: 460px;
    color: var(--muted);
  }
  .scoreboard {
    display: flex; align-items: center; gap: 14px;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    width: fit-content;
    backdrop-filter: blur(6px);
  }
  .scoreboard .team { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 14px; letter-spacing: 0.05em; }
  .scoreboard .score { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 20px; color: var(--gold); }
  .scoreboard .vs { color: var(--muted); font-size: 11px; letter-spacing: 0.2em; }

  .form-pane { padding: 48px 40px; background: var(--paper); color: var(--ink); }
  .tabs { display: flex; background: rgba(11, 30, 63, 0.06); border-radius: 8px; padding: 3px; gap: 2px; }
  .tab { flex: 1; padding: 11px 16px; border-radius: 6px; border: 0; background: transparent;
    font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 12px;
    letter-spacing: 0.1em; text-transform: uppercase; color: rgba(11, 30, 63, 0.5); cursor: pointer; }
  .tab.active { background: var(--navy); color: var(--gold); }
  form { margin-top: 28px; display: flex; flex-direction: column; gap: 18px; }
  label { display: block; font-family: 'Archivo', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--navy); }
  input { width: 100%; margin-top: 8px; padding: 13px 16px; border-radius: 8px;
    border: 1.5px solid rgba(11, 30, 63, 0.15); background: #fff; color: var(--ink);
    font-size: 14px; font-family: 'Inter', sans-serif; }
  input:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(245, 184, 0, 0.3); }
  .submit { padding: 15px; border-radius: 8px; border: 0;
    background: var(--navy); color: var(--gold);
    font-family: 'Archivo', sans-serif;
    font-weight: 900; font-size: 14px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; }
  .submit:hover { background: #091832; }
  .meta { margin-top: 20px; font-size: 13px; color: rgba(11, 30, 63, 0.65); }
  .meta a { color: var(--red); font-weight: 700; text-decoration: none; }
  .meta a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="page">
  <header class="top">
    <div class="wordmark">
      <svg width="40" height="40" viewBox="0 0 40 40" aria-label="Ultimate Pool Manager">
        <rect x="0" y="0" width="40" height="40" rx="4" fill="#0b1e3f"/>
        <path d="M6 30 L14 10 L20 10 L26 30 L30 30 L22 8 L14 8 L6 30 Z" fill="#f5b800"/>
        <rect x="8" y="20" width="14" height="2.5" fill="#f5b800"/>
        <path d="M30 30 L34 10" stroke="#a8202d" stroke-width="3" stroke-linecap="square"/>
      </svg>
      <span class="name">Ultimate Pool Manager</span>
    </div>
    <div class="live-tag">Live · Round 4</div>
  </header>

  <section class="shell">
    <div class="hero">
      <div class="hero-fallback"></div>
      <div>
        <span class="eyebrow">Prime-time Commissioners</span>
        <h1 class="headline"><span class="line">Every Event</span><span class="line">Every Contest</span><span class="line gold">One Place</span></h1>
        <p class="subhead">Your contest, your way — office pools, brackets, and survivor contests run by the Prime-time Commissioner and scored live as the tournament plays out.</p>
      </div>
      <div class="scoreboard">
        <span class="team">HOM</span>
        <span class="score">24</span>
        <span class="vs">FINAL</span>
        <span class="score">21</span>
        <span class="team">AWY</span>
      </div>
    </div>

    <div class="form-pane">
      <div class="tabs">
        <button class="tab active" type="button">Sign in</button>
        <button class="tab" type="button">Create account</button>
      </div>
      <form onsubmit="event.preventDefault()">
        <label>Username or email
          <input type="text" autocomplete="username" />
        </label>
        <label>Password
          <input type="password" autocomplete="current-password" />
        </label>
        <button class="submit" type="submit">Sign in</button>
      </form>
      <p class="meta">New here? <a href="#">Create an account</a></p>
    </div>
  </section>
</div>
</body>
</html>
