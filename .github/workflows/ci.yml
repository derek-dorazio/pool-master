name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma
      - run: npx eslint 'packages/*/src/**/*.ts' 'clients/*/src/**/*.{ts,tsx}' --max-warnings 0 || true
      - run: npx turbo typecheck

  # =========================================================================
  # Backend Unit Tests + Coverage
  # =========================================================================
  test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: poolmaster
          POSTGRES_PASSWORD: poolmaster
          POSTGRES_DB: poolmaster_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://poolmaster:poolmaster@localhost:5432/poolmaster_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma

      - name: Run Prisma migrations
        run: npx prisma migrate deploy --schema=packages/core-api/prisma/schema.prisma

      - name: Run unit tests with coverage
        run: npx jest --config tests/jest.config.js --forceExit --ci --coverage

      - name: Run integration tests
        run: npx jest --config tests/integration/jest.config.js --forceExit --ci

      - name: Backend coverage summary
        if: always()
        run: |
          echo "### Backend Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json 2>/dev/null | node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/dev/stdin','utf8'));
            const t = data.total;
            console.log('Lines:      ' + t.lines.pct + '%');
            console.log('Branches:   ' + t.branches.pct + '%');
            console.log('Functions:  ' + t.functions.pct + '%');
            console.log('Statements: ' + t.statements.pct + '%');
          " 2>/dev/null || echo "Coverage data not available"
          echo '```' >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Webapp Unit Tests + Coverage (Vitest)
  # =========================================================================
  test-webapp:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Run webapp tests with coverage
        run: cd clients/web && npx vitest run --coverage

      - name: Webapp coverage summary
        if: always()
        run: |
          echo "### Webapp Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat clients/web/coverage/coverage-summary.json 2>/dev/null | node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/dev/stdin','utf8'));
            const t = data.total;
            console.log('Lines:      ' + t.lines.pct + '%');
            console.log('Branches:   ' + t.branches.pct + '%');
            console.log('Functions:  ' + t.functions.pct + '%');
            console.log('Statements: ' + t.statements.pct + '%');
          " 2>/dev/null || echo "Coverage data not available"
          echo '```' >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Admin Unit Tests + Coverage (Vitest)
  # =========================================================================
  test-admin:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Run admin tests with coverage
        run: cd clients/admin && npx vitest run --coverage

      - name: Admin coverage summary
        if: always()
        run: |
          echo "### Admin Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat clients/admin/coverage/coverage-summary.json 2>/dev/null | node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/dev/stdin','utf8'));
            const t = data.total;
            console.log('Lines:      ' + t.lines.pct + '%');
            console.log('Branches:   ' + t.branches.pct + '%');
            console.log('Functions:  ' + t.functions.pct + '%');
            console.log('Statements: ' + t.statements.pct + '%');
          " 2>/dev/null || echo "Coverage data not available"
          echo '```' >> $GITHUB_STEP_SUMMARY

  build:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma
      - run: npx turbo build

  # =========================================================================
  # Publish Images + Deploy to QA
  # =========================================================================
  publish-images:
    runs-on: ubuntu-latest
    needs: [test, test-webapp, test-admin, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: tags
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          PREFIX="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/poolmaster-qa"
          echo "sha_tag=${SHA}" >> $GITHUB_OUTPUT
          echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT

      - name: Check ECR repos exist
        id: ecr-check
        continue-on-error: true
        run: |
          aws ecr describe-repositories --repository-names poolmaster-qa/core-api --region ${{ env.AWS_REGION }} > /dev/null 2>&1
          echo "exists=true" >> $GITHUB_OUTPUT

      - name: Build & push core-api
        if: steps.ecr-check.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.core-api
          push: true
          tags: |
            ${{ steps.tags.outputs.prefix }}/core-api:latest
            ${{ steps.tags.outputs.prefix }}/core-api:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Web Clients -> S3 + CloudFront ---

      - name: Build webapp
        run: |
          npm ci
          npx prisma generate --schema=packages/core-api/prisma/schema.prisma
          cd clients/web && npx vite build

      - name: Deploy webapp to S3 + invalidate CloudFront
        continue-on-error: true
        run: |
          BUCKET="poolmaster-qa-webapp"
          CF_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='poolmaster-qa webapp'].Id" --output text 2>/dev/null)
          if aws s3 ls "s3://${BUCKET}" 2>/dev/null; then
            aws s3 sync clients/web/dist/ "s3://${BUCKET}" --delete
            if [ -n "$CF_ID" ]; then
              aws cloudfront create-invalidation --distribution-id "$CF_ID" --paths "/*" --no-cli-pager
            fi
            echo "Webapp deployed to S3 + CloudFront invalidated"
          else
            echo "S3 bucket ${BUCKET} not found — run terraform apply first"
          fi

      - name: Build admin app
        continue-on-error: true
        run: cd clients/admin && npx vite build

      - name: Deploy admin to S3 + invalidate CloudFront
        continue-on-error: true
        run: |
          BUCKET="poolmaster-qa-admin"
          CF_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='poolmaster-qa admin'].Id" --output text 2>/dev/null)
          if aws s3 ls "s3://${BUCKET}" 2>/dev/null; then
            aws s3 sync clients/admin/dist/ "s3://${BUCKET}" --delete
            if [ -n "$CF_ID" ]; then
              aws cloudfront create-invalidation --distribution-id "$CF_ID" --paths "/*" --no-cli-pager
            fi
            echo "Admin deployed to S3 + CloudFront invalidated"
          else
            echo "S3 bucket ${BUCKET} not found — run terraform apply first"
          fi

      - name: Deploy QA services
        if: steps.ecr-check.outputs.exists == 'true'
        continue-on-error: true
        run: |
          if aws ecs describe-clusters --clusters poolmaster-qa-cluster --query 'clusters[0].status' --output text 2>/dev/null | grep -q ACTIVE; then
            for SERVICE in core-api; do
              echo "Deploying poolmaster-qa-${SERVICE}..."
              aws ecs update-service \
                --cluster poolmaster-qa-cluster \
                --service poolmaster-qa-${SERVICE} \
                --force-new-deployment \
                --no-cli-pager || echo "  Service not found (skipping)"
            done
          else
            echo "QA cluster not found — skipping deploy. Run terraform apply first."
          fi

      - name: No ECR notice
        if: steps.ecr-check.outputs.exists != 'true'
        run: |
          echo "### ECR repos not found — image push skipped" >> $GITHUB_STEP_SUMMARY
          echo "Run \`terraform apply -var-file=envs/qa.tfvars\` to create QA infrastructure first." >> $GITHUB_STEP_SUMMARY

      - name: Summary
        if: steps.ecr-check.outputs.exists == 'true'
        run: |
          echo "### Docker Images Published to ECR + QA Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| core-api (monolith) | \`latest\`, \`${{ steps.tags.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Web clients** deployed to S3 + CloudFront" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # API Smoke Tests — run against live QA after deploy
  # =========================================================================
  smoke-test:
    runs-on: ubuntu-latest
    needs: publish-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Wait for ECS deployment to stabilize
        run: sleep 60

      - name: Run smoke tests against QA
        id: smoke
        env:
          BASE_URL: https://qa.ultimateofficepoolmanager.com
        run: npx jest --config tests/api/jest.config.ts --forceExit --ci

      - name: Smoke test summary
        if: always()
        run: |
          echo "### API Smoke Tests" >> $GITHUB_STEP_SUMMARY
          echo "Target: \`https://qa.ultimateofficepoolmanager.com\`" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Playwright E2E Tests — run against live QA after smoke tests pass
  # =========================================================================
  e2e-test:
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Install Playwright browsers
        run: cd clients/web && npx playwright install --with-deps chromium

      - name: Run E2E tests against QA
        env:
          PLAYWRIGHT_BASE_URL: https://qa.ultimateofficepoolmanager.com
        run: cd clients/web && npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: clients/web/playwright-report/
          retention-days: 7

      - name: E2E summary
        if: always()
        run: |
          echo "### E2E Tests (Playwright)" >> $GITHUB_STEP_SUMMARY
          echo "Target: \`https://qa.ultimateofficepoolmanager.com\`" >> $GITHUB_STEP_SUMMARY
          echo "Report: download \`playwright-report\` artifact" >> $GITHUB_STEP_SUMMARY
