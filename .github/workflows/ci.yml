name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2

jobs:
  lint-typecheck:
    name: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma
      - run: npm run build --workspace @poolmaster/shared
      - name: Rule enforcement checks
        run: npm run rules:check
      - name: Generated API freshness
        run: npm run api:check
      - name: Riley findings marker (PRs only)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/check-pr-riley-marker.mjs
      - name: Lint full repo
        run: npm run lint
      - name: Typecheck full repo
        run: npm run typecheck

  # =========================================================================
  # Backend Unit Tests + Coverage
  # =========================================================================
  service-coverage-report:
    name: service-coverage-report
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: poolmaster
          POSTGRES_PASSWORD: poolmaster
          POSTGRES_DB: poolmaster_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://poolmaster:poolmaster@localhost:5432/poolmaster_test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma

      - name: Run Prisma migrations
        run: npx prisma migrate deploy --schema=packages/core-api/prisma/schema.prisma

      - name: Run merged service coverage
        run: npm run test:coverage:service:merged

      - name: Service coverage summary
        if: always()
        run: |
          node <<'NODE'
          const fs = require('fs');
          const summary = process.env.GITHUB_STEP_SUMMARY;
          const sections = [
            ['Service Unit Coverage', 'coverage/service-unit/coverage-summary.json'],
            ['Service Integration Coverage', 'coverage/service-integration/coverage-summary.json'],
            ['Service Functional API Coverage', 'coverage/service-functional-api/coverage-summary.json'],
            ['Merged Service Coverage', 'coverage/service-merged/coverage-summary.json'],
          ];

          const markdown = ['### Service Coverage'];
          let foundAny = false;

          for (const [label, filePath] of sections) {
            if (!fs.existsSync(filePath)) {
              console.log(`${label}: coverage data not available`);
              markdown.push('', `#### ${label}`, '', 'Coverage data not available');
              continue;
            }

            foundAny = true;
            const data = JSON.parse(fs.readFileSync(filePath, 'utf8'));
            const t = data.total;

            console.log(label);
            console.log(`Statements: ${t.statements.pct}%`);
            console.log(`Branches: ${t.branches.pct}%`);
            console.log(`Functions: ${t.functions.pct}%`);
            console.log(`Lines: ${t.lines.pct}%`);

            markdown.push(
              '',
              `#### ${label}`,
              '',
              '| Metric | Coverage |',
              '|---|---:|',
              `| Statements | ${t.statements.pct}% |`,
              `| Branches | ${t.branches.pct}% |`,
              `| Functions | ${t.functions.pct}% |`,
              `| Lines | ${t.lines.pct}% |`,
            );
          }

          if (!foundAny) {
            markdown.push('', 'Coverage data not available');
          }

          fs.appendFileSync(summary, markdown.join('\n') + '\n');
          NODE

      - name: Upload service coverage artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-service-report
          path: |
            coverage/service-merged/coverage-summary.json
            coverage/service-merged/lcov.info
            coverage/service-merged/clover.xml
            coverage/service-merged/coverage-final.json
            coverage/service-merged/lcov-report/**
            coverage/service-unit/**
            coverage/service-integration/**
            coverage/service-functional-api/**
          if-no-files-found: warn

  # =========================================================================
  # PoolMaster Webapp Unit Tests + Coverage (Vitest)
  # =========================================================================
  poolmaster-unit-tests:
    name: poolmaster-unit-tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace @poolmaster/shared

      - name: Run PoolMaster unit tests with coverage
        run: npm run test:coverage:poolmaster:unit

      - name: PoolMaster unit coverage summary
        if: always()
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'clients/poolmaster/coverage/coverage-summary.json';
          const summary = process.env.GITHUB_STEP_SUMMARY;

          if (!fs.existsSync(path)) {
            console.log('PoolMaster coverage data not available');
            fs.appendFileSync(summary, '### PoolMaster Unit Coverage\n\nCoverage data not available\n');
            process.exit(0);
          }

          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          const t = data.total;
          const lines = [
            `Statements: ${t.statements.pct}%`,
            `Branches: ${t.branches.pct}%`,
            `Functions: ${t.functions.pct}%`,
            `Lines: ${t.lines.pct}%`,
          ];

          console.log('PoolMaster unit coverage totals');
          for (const line of lines) console.log(line);

          fs.appendFileSync(
            summary,
              [
              '### PoolMaster Unit Coverage',
              '',
              '| Metric | Coverage |',
              '|---|---:|',
              `| Statements | ${t.statements.pct}% |`,
              `| Branches | ${t.branches.pct}% |`,
              `| Functions | ${t.functions.pct}% |`,
              `| Lines | ${t.lines.pct}% |`,
              '',
            ].join('\n'),
          );
          NODE

      - name: Upload PoolMaster unit coverage artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-poolmaster-unit
          path: |
            clients/poolmaster/coverage/coverage-summary.json
            clients/poolmaster/coverage/lcov.info
            clients/poolmaster/coverage/clover.xml
            clients/poolmaster/coverage/coverage-final.json
          if-no-files-found: warn

  coverage-summary:
    name: coverage-summary
    runs-on: ubuntu-latest
    needs: [service-coverage-report, poolmaster-unit-tests]
    if: always()
    steps:
      - name: Download service coverage artifact
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: coverage-service-report
          path: coverage-artifacts/service

      - name: Download PoolMaster unit coverage artifact
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: coverage-poolmaster-unit
          path: coverage-artifacts/poolmaster

      - name: Consolidated coverage summary
        if: always()
        run: |
          node <<'NODE'
          const fs = require('fs');
          const summary = process.env.GITHUB_STEP_SUMMARY;
          const reports = [
            ['Service', 'coverage-artifacts/service/service-merged/coverage-summary.json'],
            ['PoolMaster Unit', 'coverage-artifacts/poolmaster/coverage-summary.json'],
          ];

          const rows = reports.map(([name, path]) => {
            if (!fs.existsSync(path)) {
              return `| ${name} | not available | not available | not available | not available |`;
            }

            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            const t = data.total;
            return `| ${name} | ${t.statements.pct}% | ${t.branches.pct}% | ${t.functions.pct}% | ${t.lines.pct}% |`;
          });

          console.log('Coverage summary (combined)');
          for (const row of rows) console.log(row.replace(/\|/g, '').trim());

          fs.appendFileSync(
            summary,
            [
              '## Coverage Summary',
              '',
              '| Suite | Statements | Branches | Functions | Lines |',
              '|---|---:|---:|---:|---:|',
              ...rows,
              '',
            ].join('\n'),
          );
          NODE

  service-build:
    name: service-build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma
      - run: npm run build:service

  mock-contest-feed-provider-build:
    name: mock-contest-feed-provider-build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --workspace @poolmaster/mock-contest-feed-provider
      - run: npm run typecheck --workspace @poolmaster/mock-contest-feed-provider
      - run: npm run build --workspace @poolmaster/mock-contest-feed-provider

  poolmaster-build:
    name: poolmaster-build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:poolmaster

  # =========================================================================
  # Publish Images + Deploy to QA
  # =========================================================================
  publish-images:
    runs-on: ubuntu-latest
    needs: [service-coverage-report, poolmaster-unit-tests, service-build, mock-contest-feed-provider-build, poolmaster-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    outputs:
      qa_core_api_task_definition: ${{ steps.register-qa-task-defs.outputs.qa_core_api_task_definition }}
      qa_migrate_task_definition: ${{ steps.register-qa-task-defs.outputs.qa_migrate_task_definition }}
      qa_mock_contest_feed_provider_task_definition: ${{ steps.register-qa-task-defs.outputs.qa_mock_contest_feed_provider_task_definition }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image tags
        id: tags
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          FULL_SHA="${{ github.sha }}"
          PREFIX="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/poolmaster-qa"
          echo "sha_tag=${SHA}" >> $GITHUB_OUTPUT
          echo "full_sha=${FULL_SHA}" >> $GITHUB_OUTPUT
          echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT

      - name: Check ECR repos exist
        id: ecr-check
        run: |
          CORE_API_EXISTS=false
          MOCK_PROVIDER_EXISTS=false

          if aws ecr describe-repositories --repository-names poolmaster-qa/core-api --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            CORE_API_EXISTS=true
          fi

          if aws ecr describe-repositories --repository-names poolmaster-qa/mock-contest-feed-provider --region ${{ env.AWS_REGION }} > /dev/null 2>&1; then
            MOCK_PROVIDER_EXISTS=true
          fi

          echo "core_api_exists=${CORE_API_EXISTS}" >> $GITHUB_OUTPUT
          echo "mock_provider_exists=${MOCK_PROVIDER_EXISTS}" >> $GITHUB_OUTPUT

      - name: Validate QA ECS infrastructure contract
        if: steps.ecr-check.outputs.core_api_exists == 'true' || steps.ecr-check.outputs.mock_provider_exists == 'true'
        run: |
          CLUSTER="poolmaster-qa-cluster"
          CORE_SERVICE="poolmaster-qa-core-api"
          MOCK_PROVIDER_SERVICE="poolmaster-qa-mock-contest-feed-provider"

          if ! aws ecs describe-clusters --clusters "$CLUSTER" --query 'clusters[0].status' --output text 2>/dev/null | grep -q ACTIVE; then
            echo "::error::QA cluster ${CLUSTER} is missing. Run terraform apply for QA before deploying."
            exit 1
          fi

          if ! aws ecs describe-services --cluster "$CLUSTER" --services "$CORE_SERVICE" --query 'services[0].status' --output text 2>/dev/null | grep -q ACTIVE; then
            echo "::error::QA core-api service ${CORE_SERVICE} is missing. Run terraform apply for QA before deploying."
            exit 1
          fi

          if ! aws ecs describe-services --cluster "$CLUSTER" --services "$MOCK_PROVIDER_SERVICE" --query 'services[0].status' --output text 2>/dev/null | grep -q ACTIVE; then
            echo "::error::QA mock provider service ${MOCK_PROVIDER_SERVICE} is missing. Run terraform apply for QA before deploying."
            exit 1
          fi

          CORE_SERVICE_TASK_DEF=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$CORE_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$CORE_SERVICE_TASK_DEF" \
            --query 'taskDefinition.containerDefinitions[0].environment' \
            --output json > /tmp/qa-core-api-env.json

          jq -e '
            any(.[]; .name == "SPORT_DATA_DEFAULT_PROVIDER" and .value == "mock-contest-feed")
            and any(.[]; .name == "SPORT_DATA_PROVIDER_BINDINGS_JSON" and (.value | contains("mock-contest-feed-provider")))
          ' /tmp/qa-core-api-env.json > /dev/null || {
            echo "::error::QA core-api task definition is missing the required mock provider environment contract. Re-run terraform apply for QA before deploying."
            cat /tmp/qa-core-api-env.json
            exit 1
          }

      - name: Build & push core-api
        id: build-core-api
        if: steps.ecr-check.outputs.core_api_exists == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infrastructure/docker/Dockerfile.core-api
          push: true
          tags: |
            ${{ steps.tags.outputs.prefix }}/core-api:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push mock contest feed provider
        id: build-mock-provider
        if: steps.ecr-check.outputs.mock_provider_exists == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infrastructure/docker/Dockerfile.mock-contest-feed-provider
          push: true
          tags: |
            ${{ steps.tags.outputs.prefix }}/mock-contest-feed-provider:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Capture immutable image reference
        id: image-ref
        if: steps.ecr-check.outputs.core_api_exists == 'true' || steps.ecr-check.outputs.mock_provider_exists == 'true'
        run: |
          if [ "${{ steps.ecr-check.outputs.core_api_exists }}" = "true" ]; then
            CORE_API_IMAGE="${{ steps.tags.outputs.prefix }}/core-api@${{ steps.build-core-api.outputs.digest }}"
            echo "core_api_image=${CORE_API_IMAGE}" >> $GITHUB_OUTPUT
            echo "Using immutable core-api image: ${CORE_API_IMAGE}"
          fi

          if [ "${{ steps.ecr-check.outputs.mock_provider_exists }}" = "true" ]; then
            MOCK_PROVIDER_IMAGE="${{ steps.tags.outputs.prefix }}/mock-contest-feed-provider@${{ steps.build-mock-provider.outputs.digest }}"
            echo "mock_provider_image=${MOCK_PROVIDER_IMAGE}" >> $GITHUB_OUTPUT
            echo "Using immutable mock provider image: ${MOCK_PROVIDER_IMAGE}"
          fi

      - name: Register QA ECS task definitions
        id: register-qa-task-defs
        if: steps.ecr-check.outputs.core_api_exists == 'true' || steps.ecr-check.outputs.mock_provider_exists == 'true'
        run: |
          CORE_API_IMAGE="${{ steps.image-ref.outputs.core_api_image }}"
          MOCK_PROVIDER_IMAGE="${{ steps.image-ref.outputs.mock_provider_image }}"
          CLUSTER="poolmaster-qa-cluster"
          CORE_SERVICE="poolmaster-qa-core-api"
          MOCK_PROVIDER_SERVICE="poolmaster-qa-mock-contest-feed-provider"
          MIGRATE_FAMILY="poolmaster-qa-migrate"
          CORE_API_LOG_LEVEL="debug"
          MOCK_PROVIDER_LOG_LEVEL="debug"
          SERVICE_BUILD_NUMBER="${{ github.run_number }}"
          SERVICE_BUILD_TIME_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          SERVICE_GIT_REF="${GITHUB_REF_NAME}"
          SERVICE_GIT_SHA="${{ steps.tags.outputs.full_sha }}"
          SERVICE_VERSION="${{ steps.tags.outputs.full_sha }}"
          QA_CORE_API_TASK_DEF=""
          QA_MIGRATE_TASK_DEF=""
          QA_MOCK_PROVIDER_TASK_DEF=""

          if [ -n "$CORE_API_IMAGE" ] && aws ecs describe-services --cluster "$CLUSTER" --services "$CORE_SERVICE" --query 'services[0].status' --output text 2>/dev/null | grep -q ACTIVE; then
            CORE_SERVICE_TASK_DEF=$(aws ecs describe-services \
              --cluster "$CLUSTER" \
              --services "$CORE_SERVICE" \
              --query 'services[0].taskDefinition' \
              --output text)

            aws ecs describe-task-definition \
              --task-definition "$CORE_SERVICE_TASK_DEF" \
              --query 'taskDefinition' \
              --output json \
              | jq \
                  --arg IMAGE "$CORE_API_IMAGE" \
                  --arg LOG_LEVEL "$CORE_API_LOG_LEVEL" \
                  --arg BUILD_NUMBER "$SERVICE_BUILD_NUMBER" \
                  --arg BUILD_TIME_UTC "$SERVICE_BUILD_TIME_UTC" \
                  --arg GIT_REF "$SERVICE_GIT_REF" \
                  --arg SERVICE_GIT_SHA "$SERVICE_GIT_SHA" \
                  --arg SERVICE_VERSION "$SERVICE_VERSION" '
                  del(
                    .taskDefinitionArn,
                    .revision,
                    .status,
                    .requiresAttributes,
                    .compatibilities,
                    .registeredAt,
                    .registeredBy
                  )
                  | .containerDefinitions |= map(
                      if .name == "core-api"
                      then
                        .image = $IMAGE
                        | .environment = ((.environment // [])
                          | map(select(.name as $name | [
                            "LOG_LEVEL",
                            "POOLMASTER_BUILD_NUMBER",
                            "POOLMASTER_BUILD_TIME_UTC",
                            "POOLMASTER_GIT_REF",
                            "POOLMASTER_SERVICE_GIT_SHA",
                            "POOLMASTER_SERVICE_VERSION"
                          ] | index($name) | not))
                          + [
                            { name: "LOG_LEVEL", value: $LOG_LEVEL },
                            { name: "POOLMASTER_BUILD_NUMBER", value: $BUILD_NUMBER },
                            { name: "POOLMASTER_BUILD_TIME_UTC", value: $BUILD_TIME_UTC },
                            { name: "POOLMASTER_GIT_REF", value: $GIT_REF },
                            { name: "POOLMASTER_SERVICE_GIT_SHA", value: $SERVICE_GIT_SHA },
                            { name: "POOLMASTER_SERVICE_VERSION", value: $SERVICE_VERSION }
                          ])
                      else . end
                    )
                ' > /tmp/qa-core-api-task-def.json

            QA_CORE_API_TASK_DEF=$(aws ecs register-task-definition \
              --cli-input-json file:///tmp/qa-core-api-task-def.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

            aws ecs describe-task-definition \
              --task-definition "$MIGRATE_FAMILY" \
              --query 'taskDefinition' \
              --output json \
              | jq --arg IMAGE "$CORE_API_IMAGE" '
                  del(
                    .taskDefinitionArn,
                    .revision,
                    .status,
                    .requiresAttributes,
                    .compatibilities,
                    .registeredAt,
                    .registeredBy
                  )
                  | .containerDefinitions |= map(
                      if .name == "migrate"
                      then .image = $IMAGE | .command = ["node", "scripts/run-migrations.mjs"]
                      else . end
                    )
                ' > /tmp/qa-migrate-task-def.json

            QA_MIGRATE_TASK_DEF=$(aws ecs register-task-definition \
              --cli-input-json file:///tmp/qa-migrate-task-def.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)
          fi

          if [ -n "$MOCK_PROVIDER_IMAGE" ] && aws ecs describe-services --cluster "$CLUSTER" --services "$MOCK_PROVIDER_SERVICE" --query 'services[0].status' --output text 2>/dev/null | grep -q ACTIVE; then
            MOCK_PROVIDER_SERVICE_TASK_DEF=$(aws ecs describe-services \
              --cluster "$CLUSTER" \
              --services "$MOCK_PROVIDER_SERVICE" \
              --query 'services[0].taskDefinition' \
              --output text)

            aws ecs describe-task-definition \
              --task-definition "$MOCK_PROVIDER_SERVICE_TASK_DEF" \
              --query 'taskDefinition' \
              --output json \
              | jq --arg IMAGE "$MOCK_PROVIDER_IMAGE" --arg LOG_LEVEL "$MOCK_PROVIDER_LOG_LEVEL" '
                  del(
                    .taskDefinitionArn,
                    .revision,
                    .status,
                    .requiresAttributes,
                    .compatibilities,
                    .registeredAt,
                    .registeredBy
                  )
                  | .containerDefinitions |= map(
                      if .name == "mock-contest-feed-provider"
                      then
                        .image = $IMAGE
                        | .environment = ((.environment // [])
                          | map(select(.name != "LOG_LEVEL"))
                          + [{ name: "LOG_LEVEL", value: $LOG_LEVEL }])
                      else . end
                    )
                ' > /tmp/qa-mock-provider-task-def.json

            QA_MOCK_PROVIDER_TASK_DEF=$(aws ecs register-task-definition \
              --cli-input-json file:///tmp/qa-mock-provider-task-def.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)
          fi

          echo "qa_core_api_task_definition=${QA_CORE_API_TASK_DEF}" >> $GITHUB_OUTPUT
          echo "qa_migrate_task_definition=${QA_MIGRATE_TASK_DEF}" >> $GITHUB_OUTPUT
          echo "qa_mock_contest_feed_provider_task_definition=${QA_MOCK_PROVIDER_TASK_DEF}" >> $GITHUB_OUTPUT

          if [ -n "${QA_CORE_API_TASK_DEF}" ]; then
            echo "Registered QA core-api task definition: ${QA_CORE_API_TASK_DEF}"
          fi
          if [ -n "${QA_MIGRATE_TASK_DEF}" ]; then
            echo "Registered QA migrate task definition: ${QA_MIGRATE_TASK_DEF}"
          fi
          if [ -n "${QA_MOCK_PROVIDER_TASK_DEF}" ]; then
            echo "Registered QA mock provider task definition: ${QA_MOCK_PROVIDER_TASK_DEF}"
          fi

      # --- Web Clients -> S3 + CloudFront ---

      - name: Build PoolMaster webapp
        run: |
          npm ci
          npx prisma generate --schema=packages/core-api/prisma/schema.prisma
          WEB_RELEASE_PREFIX="releases/${{ steps.tags.outputs.full_sha }}"
          cd clients/poolmaster
          APP_ASSET_BASE="/${WEB_RELEASE_PREFIX}/" \
          POOLMASTER_ENVIRONMENT="qa" \
          VITE_LOG_LEVEL="debug" \
          POOLMASTER_RELEASE_PREFIX="${WEB_RELEASE_PREFIX}" \
          POOLMASTER_BUILD_TIME_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
          POOLMASTER_BUILD_NUMBER="${{ github.run_number }}" \
          POOLMASTER_GIT_REF="${GITHUB_REF_NAME}" \
          POOLMASTER_WEBAPP_GIT_SHA="${{ steps.tags.outputs.full_sha }}" \
          POOLMASTER_SERVICE_VERSION="${{ steps.tags.outputs.full_sha }}" \
          POOLMASTER_SERVICE_GIT_SHA="${{ steps.tags.outputs.full_sha }}" \
          npm run build
          grep -q "/${WEB_RELEASE_PREFIX}/" dist/index.html
          test -f dist/version-info.json

      - name: Deploy PoolMaster webapp to S3 + invalidate CloudFront
        id: deploy-webapp
        run: |
          BUCKET="poolmaster-qa-webapp"
          RELEASE_PREFIX="releases/${{ steps.tags.outputs.full_sha }}"
          CF_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='poolmaster-qa webapp'].Id" --output text 2>/dev/null)
          if aws s3 ls "s3://${BUCKET}" 2>/dev/null; then
            aws s3 sync clients/poolmaster/dist/ "s3://${BUCKET}/${RELEASE_PREFIX}/" --delete
            aws s3 cp clients/poolmaster/dist/index.html "s3://${BUCKET}/index.html" --cache-control "no-store, no-cache, max-age=0, must-revalidate" --content-type "text/html"
            aws s3api head-object --bucket "${BUCKET}" --key "${RELEASE_PREFIX}/index.html" >/dev/null
            aws s3api head-object --bucket "${BUCKET}" --key "index.html" >/dev/null
            if [ -n "$CF_ID" ]; then
              aws cloudfront create-invalidation --distribution-id "$CF_ID" --paths "/*" --no-cli-pager
            fi
            echo "release_prefix=${RELEASE_PREFIX}" >> $GITHUB_OUTPUT
            echo "PoolMaster webapp deployed to S3 release ${RELEASE_PREFIX} and root index updated"
          else
            echo "::error::S3 bucket ${BUCKET} not found — run terraform apply first"
            exit 1
          fi

      - name: Deploy QA services
        if: steps.ecr-check.outputs.core_api_exists == 'true' || steps.ecr-check.outputs.mock_provider_exists == 'true'
        run: |
          if aws ecs describe-clusters --clusters poolmaster-qa-cluster --query 'clusters[0].status' --output text 2>/dev/null | grep -q ACTIVE; then
            if [ -n "${{ steps.register-qa-task-defs.outputs.qa_core_api_task_definition }}" ]; then
              echo "Deploying poolmaster-qa-core-api with task definition ${{ steps.register-qa-task-defs.outputs.qa_core_api_task_definition }}..."
              aws ecs update-service \
                --cluster poolmaster-qa-cluster \
                --service poolmaster-qa-core-api \
                --task-definition "${{ steps.register-qa-task-defs.outputs.qa_core_api_task_definition }}" \
                --no-cli-pager
            fi

            if [ -n "${{ steps.register-qa-task-defs.outputs.qa_mock_contest_feed_provider_task_definition }}" ]; then
              echo "Deploying poolmaster-qa-mock-contest-feed-provider with task definition ${{ steps.register-qa-task-defs.outputs.qa_mock_contest_feed_provider_task_definition }}..."
              aws ecs update-service \
                --cluster poolmaster-qa-cluster \
                --service poolmaster-qa-mock-contest-feed-provider \
                --task-definition "${{ steps.register-qa-task-defs.outputs.qa_mock_contest_feed_provider_task_definition }}" \
                --no-cli-pager
            fi
          else
            echo "QA cluster not found — skipping deploy. Run terraform apply first."
          fi

      - name: No ECR notice
        if: steps.ecr-check.outputs.core_api_exists != 'true' && steps.ecr-check.outputs.mock_provider_exists != 'true'
        run: |
          echo "### ECR repos not found — image push skipped" >> $GITHUB_STEP_SUMMARY
          echo "Run \`terraform apply -var-file=envs/qa.tfvars\` to create QA infrastructure first." >> $GITHUB_STEP_SUMMARY

      - name: Summary
        if: steps.ecr-check.outputs.core_api_exists == 'true' || steps.ecr-check.outputs.mock_provider_exists == 'true'
        run: |
          echo "### Docker Images Published to ECR + QA Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.ecr-check.outputs.core_api_exists }}" = "true" ]; then
            echo "| core-api tag | \`${{ steps.tags.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| core-api immutable image | \`${{ steps.image-ref.outputs.core_api_image }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| QA core-api task definition | \`${{ steps.register-qa-task-defs.outputs.qa_core_api_task_definition }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| QA migrate task definition | \`${{ steps.register-qa-task-defs.outputs.qa_migrate_task_definition }}\` |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.ecr-check.outputs.mock_provider_exists }}" = "true" ]; then
            echo "| mock contest feed tag | \`${{ steps.tags.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| mock contest feed immutable image | \`${{ steps.image-ref.outputs.mock_provider_image }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| QA mock provider task definition | \`${{ steps.register-qa-task-defs.outputs.qa_mock_contest_feed_provider_task_definition }}\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| QA webapp release prefix | \`${{ steps.deploy-webapp.outputs.release_prefix }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PoolMaster webapp** deployed to immutable S3 release prefixes with root index promotion" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The mock contest feed provider is deployed in QA only and is intentionally not promoted to staging or prod." >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # QA Database Migrations — apply schema changes before smoke tests
  # =========================================================================
  migrate-qa:
    runs-on: ubuntu-latest
    needs: publish-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run ECS migration task
        id: run-migration
        run: |
          SUBNETS="${{ secrets.QA_PRIVATE_SUBNETS }}"
          SG="${{ secrets.QA_ECS_SECURITY_GROUP }}"
          MIGRATE_TASK_DEFINITION="${{ needs.publish-images.outputs.qa_migrate_task_definition }}"

          if [ -z "$SUBNETS" ] || [ -z "$SG" ]; then
            echo "⚠️ QA_PRIVATE_SUBNETS or QA_ECS_SECURITY_GROUP secret not set — skipping migrations"
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -z "$MIGRATE_TASK_DEFINITION" ] || [ "$MIGRATE_TASK_DEFINITION" = "None" ]; then
            MIGRATE_TASK_DEFINITION=$(aws ecs describe-task-definition \
              --task-definition poolmaster-qa-migrate \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text 2>/dev/null || echo "")
          fi

          if [ -z "$MIGRATE_TASK_DEFINITION" ] || [ "$MIGRATE_TASK_DEFINITION" = "None" ]; then
            echo "::warning::No QA migrate task definition is available — skipping migrations"
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Resolved QA migrate task definition: $MIGRATE_TASK_DEFINITION"
          echo "Starting migration task in ECS..."
          TASK_ARN=$(aws ecs run-task \
            --cluster poolmaster-qa-cluster \
            --task-definition "$MIGRATE_TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SG}],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)

          if [ "$TASK_ARN" = "None" ] || [ -z "$TASK_ARN" ]; then
            echo "::warning::Failed to start migration task — task definition may not exist yet. Run terraform apply first."
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "task_arn=${TASK_ARN}" >> $GITHUB_OUTPUT
          echo "Migration task started: ${TASK_ARN}"

      - name: Wait for migration to complete
        if: steps.run-migration.outputs.skipped != 'true'
        run: |
          TASK_ARN="${{ steps.run-migration.outputs.task_arn }}"
          CLUSTER="poolmaster-qa-cluster"

          echo "Waiting for migration task to complete..."
          for i in $(seq 1 40); do
            STATUS=$(aws ecs describe-tasks --cluster $CLUSTER --tasks $TASK_ARN \
              --query 'tasks[0].lastStatus' --output text)
            echo "  Status: $STATUS (attempt $i/40)"

            if [ "$STATUS" = "STOPPED" ]; then
              EXIT_CODE=$(aws ecs describe-tasks --cluster $CLUSTER --tasks $TASK_ARN \
                --query 'tasks[0].containers[0].exitCode' --output text)
              REASON=$(aws ecs describe-tasks --cluster $CLUSTER --tasks $TASK_ARN \
                --query 'tasks[0].containers[0].reason' --output text 2>/dev/null || echo "")

              if [ "$EXIT_CODE" = "0" ]; then
                echo "✅ Migration completed successfully"
                exit 0
              else
                echo "❌ Migration failed with exit code: $EXIT_CODE"
                [ -n "$REASON" ] && [ "$REASON" != "None" ] && echo "  Reason: $REASON"
                # Fetch logs for debugging
                TASK_ID=$(echo $TASK_ARN | awk -F'/' '{print $NF}')
                echo "--- Migration Logs ---"
                aws logs get-log-events \
                  --log-group-name /ecs/poolmaster-qa/migrate \
                  --log-stream-name "ecs/migrate/${TASK_ID}" \
                  --query 'events[].message' --output text 2>/dev/null || echo "(no logs available)"
                exit 1
              fi
            fi

            sleep 15
          done

          echo "Migration task timed out after 10 minutes"
          exit 1

      - name: Capture QA service rollout target
        id: qa-service-target
        run: |
          CLUSTER="poolmaster-qa-cluster"
          SERVICE="poolmaster-qa-core-api"
          EXPECTED_TASK_DEFINITION=$(aws ecs describe-task-definition \
            --task-definition poolmaster-qa-core-api \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text 2>/dev/null || echo "")

          if ! aws ecs describe-clusters --clusters "$CLUSTER" --query 'clusters[0].status' --output text 2>/dev/null | grep -q ACTIVE; then
            echo "cluster_active=false" >> $GITHUB_OUTPUT
            echo "QA cluster not found — skipping rollout target capture."
            exit 0
          fi

          echo "cluster_active=true" >> $GITHUB_OUTPUT
          TASK_DEFINITION=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text 2>/dev/null || echo "")

          PRIMARY_TASK_SET=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].deployments[?status==`PRIMARY`][0].taskDefinition' \
            --output text 2>/dev/null || echo "")

          echo "task_definition=${TASK_DEFINITION}" >> $GITHUB_OUTPUT
          echo "primary_task_definition=${PRIMARY_TASK_SET}" >> $GITHUB_OUTPUT

          echo "### QA ECS Rollout Target" >> $GITHUB_STEP_SUMMARY
          echo "- Service: \`$SERVICE\`" >> $GITHUB_STEP_SUMMARY
          echo "- Expected task definition: \`${EXPECTED_TASK_DEFINITION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Reported task definition: \`${TASK_DEFINITION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- PRIMARY deployment task definition: \`${PRIMARY_TASK_SET}\`" >> $GITHUB_STEP_SUMMARY

      - name: Wait for ECS service to stabilize
        id: ecs-stabilize
        run: |
          CLUSTER="poolmaster-qa-cluster"
          SERVICE="poolmaster-qa-core-api"

          if ! aws ecs describe-clusters --clusters "$CLUSTER" --query 'clusters[0].status' --output text 2>/dev/null | grep -q ACTIVE; then
            echo "QA cluster not found — skipping service stabilization wait."
            echo "stable=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          set +e
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE"
          EXIT_CODE=$?
          set -e

          if [ "$EXIT_CODE" = "0" ]; then
            echo "stable=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "stable=false" >> $GITHUB_OUTPUT
          echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT
          exit 0

      - name: Dump ECS stabilization diagnostics
        if: steps.ecs-stabilize.outputs.stable == 'false'
        run: |
          CLUSTER="poolmaster-qa-cluster"
          SERVICE="poolmaster-qa-core-api"

          echo "--- ECS Service Description ---"
          aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --output json

          echo "--- ECS Deployments ---"
          aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].deployments[*].{status:status,rolloutState:rolloutState,rolloutStateReason:rolloutStateReason,taskDefinition:taskDefinition,desiredCount:desiredCount,pendingCount:pendingCount,runningCount:runningCount,failedTasks:failedTasks,createdAt:createdAt,updatedAt:updatedAt}' \
            --output table

          echo "--- Recent ECS Service Events ---"
          aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].events[:10].[createdAt,message]' \
            --output table

          TASK_DEFINITION="${{ steps.qa-service-target.outputs.task_definition }}"
          if [ -n "$TASK_DEFINITION" ] && [ "$TASK_DEFINITION" != "None" ]; then
            echo "--- ECS Task Definition ---"
            aws ecs describe-task-definition \
              --task-definition "$TASK_DEFINITION" \
              --query 'taskDefinition.{taskDefinitionArn:taskDefinitionArn,containerDefinitions:containerDefinitions[*].{name:name,image:image,healthCheck:healthCheck,logConfiguration:logConfiguration}}' \
              --output json
          fi

          echo "--- Running Tasks ---"
          RUNNING_TASKS=$(aws ecs list-tasks \
            --cluster "$CLUSTER" \
            --service-name "$SERVICE" \
            --desired-status RUNNING \
            --query 'taskArns' \
            --output text)
          if [ -n "$RUNNING_TASKS" ] && [ "$RUNNING_TASKS" != "None" ]; then
            aws ecs describe-tasks \
              --cluster "$CLUSTER" \
              --tasks $RUNNING_TASKS \
              --query 'tasks[*].{taskArn:taskArn,taskDefinitionArn:taskDefinitionArn,lastStatus:lastStatus,desiredStatus:desiredStatus,healthStatus:healthStatus,launchType:launchType,startedAt:startedAt,stopCode:stopCode,stoppedReason:stoppedReason,containers:containers[*].{name:name,lastStatus:lastStatus,healthStatus:healthStatus,exitCode:exitCode,reason:reason,image:image,networkBindings:networkBindings,networkInterfaces:networkInterfaces}}' \
              --output json
          else
            echo "(no running tasks)"
          fi

          echo "--- Recently Stopped Tasks ---"
          STOPPED_TASKS=$(aws ecs list-tasks \
            --cluster "$CLUSTER" \
            --service-name "$SERVICE" \
            --desired-status STOPPED \
            --query 'taskArns[:10]' \
            --output text)
          if [ -n "$STOPPED_TASKS" ] && [ "$STOPPED_TASKS" != "None" ]; then
            aws ecs describe-tasks \
              --cluster "$CLUSTER" \
              --tasks $STOPPED_TASKS \
              --query 'tasks[*].{taskArn:taskArn,taskDefinitionArn:taskDefinitionArn,lastStatus:lastStatus,desiredStatus:desiredStatus,healthStatus:healthStatus,launchType:launchType,startedAt:startedAt,stoppedAt:stoppedAt,stopCode:stopCode,stoppedReason:stoppedReason,containers:containers[*].{name:name,lastStatus:lastStatus,healthStatus:healthStatus,exitCode:exitCode,reason:reason,image:image,networkBindings:networkBindings,networkInterfaces:networkInterfaces}}' \
              --output json

            TASK_ID=$(echo "$STOPPED_TASKS" | awk '{print $1}' | awk -F'/' '{print $NF}')
            if [ -n "$TASK_ID" ] && [ "$TASK_ID" != "None" ] && [ -n "$TASK_DEFINITION" ] && [ "$TASK_DEFINITION" != "None" ]; then
              LOG_GROUP=$(aws ecs describe-task-definition \
                --task-definition "$TASK_DEFINITION" \
                --query 'taskDefinition.containerDefinitions[?name==`core-api`][0].logConfiguration.options."awslogs-group"' \
                --output text 2>/dev/null || echo "")
              LOG_PREFIX=$(aws ecs describe-task-definition \
                --task-definition "$TASK_DEFINITION" \
                --query 'taskDefinition.containerDefinitions[?name==`core-api`][0].logConfiguration.options."awslogs-stream-prefix"' \
                --output text 2>/dev/null || echo "")

              if [ -n "$LOG_GROUP" ] && [ "$LOG_GROUP" != "None" ] && [ -n "$LOG_PREFIX" ] && [ "$LOG_PREFIX" != "None" ]; then
                echo "--- Recent CloudWatch Log Streams (${LOG_GROUP}) ---"
                aws logs describe-log-streams \
                  --log-group-name "$LOG_GROUP" \
                  --order-by LastEventTime \
                  --descending \
                  --max-items 10 \
                  --query 'logStreams[*].{logStreamName:logStreamName,lastEventTimestamp:lastEventTimestamp,lastIngestionTime:lastIngestionTime}' \
                  --output table 2>/dev/null || echo "(no recent log streams available)"

                echo "--- Latest Stopped Task Logs (${TASK_ID}) ---"
                LOG_STREAM=$(aws logs describe-log-streams \
                  --log-group-name "$LOG_GROUP" \
                  --log-stream-name-prefix "${LOG_PREFIX}/core-api/${TASK_ID}" \
                  --order-by LastEventTime \
                  --descending \
                  --max-items 1 \
                  --query 'logStreams[0].logStreamName' \
                  --output text 2>/dev/null || echo "")

                if [ -n "$LOG_STREAM" ] && [ "$LOG_STREAM" != "None" ]; then
                  aws logs get-log-events \
                    --log-group-name "$LOG_GROUP" \
                    --log-stream-name "$LOG_STREAM" \
                    --query 'events[].message' \
                    --output text 2>/dev/null || echo "(no task logs available)"
                else
                  echo "(no task log stream found for ${TASK_ID})"
                fi
              fi
            fi
          else
            echo "(no stopped tasks)"
          fi

          TARGET_GROUP_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --query 'services[0].loadBalancers[0].targetGroupArn' \
            --output text 2>/dev/null || echo "")
          if [ -n "$TARGET_GROUP_ARN" ] && [ "$TARGET_GROUP_ARN" != "None" ]; then
            echo "--- ALB Target Health ---"
            aws elbv2 describe-target-health \
              --target-group-arn "$TARGET_GROUP_ARN" \
              --query 'TargetHealthDescriptions[*].{targetId:Target.Id,targetPort:Target.Port,state:TargetHealth.State,reason:TargetHealth.Reason,description:TargetHealth.Description}' \
              --output table 2>/dev/null || echo "(no target health data available)"
          fi

          echo "### ECS Stabilization Failure" >> $GITHUB_STEP_SUMMARY
          echo "- Service: \`$SERVICE\`" >> $GITHUB_STEP_SUMMARY
          echo "- Waiter exit code: \`${{ steps.ecs-stabilize.outputs.exit_code }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Reported task definition: \`${{ steps.qa-service-target.outputs.task_definition }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- PRIMARY task definition: \`${{ steps.qa-service-target.outputs.primary_task_definition }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Recent ECS service events and latest stopped-task logs were dumped to the job output." >> $GITHUB_STEP_SUMMARY

      - name: Fail on ECS stabilization error
        if: steps.ecs-stabilize.outputs.stable == 'false'
        run: |
          echo "QA ECS service failed to stabilize after deployment."
          exit 1

      - name: Warm-up delay after ECS stabilization
        if: steps.ecs-stabilize.outputs.stable == 'true'
        run: sleep 20

  poolmaster-browser-e2e:
    name: poolmaster-browser-e2e
    runs-on: ubuntu-latest
    needs: migrate-qa
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      POOLMASTER_E2E_BASE_URL: https://qa.ultimateofficepoolmanager.com
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Verify deployed PoolMaster frontend release
        run: |
          EXPECTED_RELEASE="releases/${{ github.sha }}"

          for ATTEMPT in $(seq 1 24); do
            HTML=$(curl -fsSL "$POOLMASTER_E2E_BASE_URL/" || true)

            if printf '%s' "$HTML" | grep -q "$EXPECTED_RELEASE"; then
              echo "Verified deployed PoolMaster frontend release: $EXPECTED_RELEASE"
              exit 0
            fi

            echo "Attempt $ATTEMPT: deployed frontend release did not yet match $EXPECTED_RELEASE"
            sleep 5
          done

          echo "Expected deployed PoolMaster frontend release $EXPECTED_RELEASE was not observed."
          exit 1
      - run: npm ci
      - name: Install Playwright Chromium
        run: cd clients/poolmaster && npx playwright install --with-deps chromium
      - name: Run PoolMaster browser E2E
        run: cd clients/poolmaster && npx playwright test
      - name: Upload PoolMaster browser E2E artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: poolmaster-browser-e2e
          path: |
            clients/poolmaster/playwright-report/**
            clients/poolmaster/test-results/**
          if-no-files-found: warn
      - name: PoolMaster browser E2E summary
        if: always()
        run: |
          echo "### PoolMaster Browser E2E" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Base URL: \`$POOLMASTER_E2E_BASE_URL\`" >> $GITHUB_STEP_SUMMARY
          echo "- Expected release prefix: \`releases/${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Journeys: stable role auth setup, reusable QA league repair, commissioner/member/root-admin route smoke" >> $GITHUB_STEP_SUMMARY
