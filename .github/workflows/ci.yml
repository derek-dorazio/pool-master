name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma
      - run: npx eslint 'packages/*/src/**/*.ts' 'clients/*/src/**/*.{ts,tsx}' --max-warnings 0 || true
      - run: npx turbo typecheck

  test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: poolmaster
          POSTGRES_PASSWORD: poolmaster
          POSTGRES_DB: poolmaster_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://poolmaster:poolmaster@localhost:5432/poolmaster_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma
      - run: npx jest --config tests/jest.config.js --forceExit --ci

  build:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma
      - run: npx turbo build

  publish-images:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: tags
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          # QA environment auto-deploys on push to main
          PREFIX="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/poolmaster-qa"
          echo "sha_tag=${SHA}" >> $GITHUB_OUTPUT
          echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT

      # --- Backend Services ---

      - name: Build & push core-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.core-api
          push: true
          tags: |
            ${{ steps.tags.outputs.prefix }}/core-api:latest
            ${{ steps.tags.outputs.prefix }}/core-api:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push draft-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.draft-service
          push: true
          tags: |
            ${{ steps.tags.outputs.prefix }}/draft-service:latest
            ${{ steps.tags.outputs.prefix }}/draft-service:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push scoring-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.scoring-service
          push: true
          tags: |
            ${{ steps.tags.outputs.prefix }}/scoring-service:latest
            ${{ steps.tags.outputs.prefix }}/scoring-service:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ingestion-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.ingestion-worker
          push: true
          tags: |
            ${{ steps.tags.outputs.prefix }}/ingestion-worker:latest
            ${{ steps.tags.outputs.prefix }}/ingestion-worker:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push notification-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.notification-service
          push: true
          tags: |
            ${{ steps.tags.outputs.prefix }}/notification-service:latest
            ${{ steps.tags.outputs.prefix }}/notification-service:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Web Clients ---

      - name: Build & push web app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.web
          push: true
          tags: |
            ${{ steps.tags.outputs.prefix }}/web:latest
            ${{ steps.tags.outputs.prefix }}/web:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push admin app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.admin
          push: true
          tags: |
            ${{ steps.tags.outputs.prefix }}/admin:latest
            ${{ steps.tags.outputs.prefix }}/admin:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Deploy to QA (force new deployment to pick up :latest) ---

      - name: Deploy QA services
        run: |
          for SERVICE in core-api draft-service scoring-service ingestion-worker notification-service web; do
            echo "Deploying poolmaster-qa-${SERVICE}..."
            aws ecs update-service \
              --cluster poolmaster-qa-cluster \
              --service poolmaster-qa-${SERVICE} \
              --force-new-deployment \
              --no-cli-pager || echo "Service poolmaster-qa-${SERVICE} not found (deploy infra first)"
          done

      - name: Summary
        run: |
          echo "### Docker Images Published to ECR + QA Deployed 🐳" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| core-api | \`latest\`, \`${{ steps.tags.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| draft-service | \`latest\`, \`${{ steps.tags.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| scoring-service | \`latest\`, \`${{ steps.tags.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ingestion-worker | \`latest\`, \`${{ steps.tags.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| notification-service | \`latest\`, \`${{ steps.tags.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| web | \`latest\`, \`${{ steps.tags.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| admin | \`latest\`, \`${{ steps.tags.outputs.sha_tag }}\` |" >> $GITHUB_STEP_SUMMARY
